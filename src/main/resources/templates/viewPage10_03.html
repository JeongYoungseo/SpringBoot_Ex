<!DOCTYPE html>
<html lang="en" xmlns:sec="www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>view page 사용자 정보 검색</title>
</head>
<body>
    <h2>view page 사용자 정보 검색</h2>
    <div sec:authorize="hasRole('ROLE_MANAGER')">
        <p><b>매니저 권한 화면</b></p>
    </div>

    <div sec:authorize="isAuthenticated()">
        <p><b>역할: 매니저가 로그인 중</b></p>
        <p><a href="/exam10_01/exam02">[웹 요청 URI /exam10_01/exam02]</a></p>
    </div>

    <div sec:authorize="isAnonymous()">
        <p><b>로그인 필요</b></p>
        <p><a href="/exam10_01/manager/tag">[웹 요청 URI /exam10_01/manager/tag]</a></p>
    </div>
</body>
</html>
