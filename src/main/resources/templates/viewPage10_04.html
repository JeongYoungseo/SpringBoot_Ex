<!DOCTYPE html>
<html lang="en" xmlns:sec="www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>view page 사용자 정보 검색2</title>
</head>
<body>
    <h2>view page 사용자 정보 검색</h2>
    <div sec:authorize="hasRole('ROLE_ADMIN')">
        <p><b>관리자 권한 화면</b></p>
    </div>

    <div sec:authorize="isAuthenticated()">
        <p><b>로그인 중</b></p>
        <p><b>username: <span sec:authentication="name"></span></b></p>
        <p><b>user role:<span sec:authentication="authorities"></span></b></p>
        <p><b>authentication<span sec:authentication="authenticated"></span></b></p>
        <p><a href="/exam10_01/exam04">[웹 요청 URI /exam10_01/exam04]</a></p>
    </div>

    <div sec:authorize="isAnonymous()">
        <p><b>로그인 필요</b></p>
        <p><a href="/exam10_01/admin/tag">[웹 요청 URI /exam10_01/admin/tag]</a></p>
    </div>
</body>
</html>
